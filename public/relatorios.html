<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios - Carnaval</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>📊 Relatórios</h1>
        </header>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="cadastro_notas.html">Cadastrar Notas</a></li>
                <li><a href="relatorios.html">Relatórios</a></li>
            </ul>
        </nav>

        <main>
            <section class="botoes-relatorio">
                <h2>Selecione um Relatório</h2>
                <div class="grupo-botoes">
                    <button type="button" class="btn-relatorio" id="btnNotasIndividuais"
                        onclick="carregarNotasIndividuaisComFotos()">
                        📋 Notas Individuais
                    </button>
                    <button type="button" class="btn-relatorio" onclick="carregarNotaFinalQuesito()">
                        🎯 Nota Final por Quesito
                    </button>
                    <button type="button" class="btn-relatorio" onclick="carregarPontuacaoTotal()">
                        🏆 Pontuação Total
                    </button>
                    <button type="button" class="btn-relatorio" onclick="carregarEscolaVencedora()">
                        👑 Escola Vencedora
                    </button>
                    <button type="button" class="btn-relatorio btn-limpar" onclick="limparRelatorio()">
                        🗑️ Limpar
                    </button>
                </div>
            </section>

            <div id="resultado"></div>
        </main>
    </div>

    <script>
        async function fetchJson(url) {
            const response = await fetch(url);
            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                throw new Error(data?.erro || `HTTP ${response.status} em ${url}`);
            }

            return data;
        }

        function mostrarErro(msg) {
            document.getElementById('resultado').innerHTML =
                `<div class="resultado-relatorio"><p>❌ ${msg}</p></div>`;
        }

        async function carregarNotasIndividuaisComFotos() {
            try {
                const notas = await fetchJson('/api/relatorio/notas-individuais');

                if (!Array.isArray(notas) || notas.length === 0) {
                    mostrarErro('Nenhum dado disponível');
                    return;
                }

                const jurados = await fetchJson('/api/jurados-com-foto');
                const mapaJurados = {};

                jurados.forEach(j => {
                    mapaJurados[j.nome_jurado] = j.foto_base64
                        ? `data:image/jpeg;base64,${j.foto_base64}`
                        : '/imagens/padrao.jpg';
                });

                const notasAgrupadas = {};
                notas.forEach(nota => {
                    const chave = `${nota.nome_escola}_${nota.nome_quesito}`;
                    if (!notasAgrupadas[chave]) {
                        notasAgrupadas[chave] = {
                            escola: nota.nome_escola,
                            quesito: nota.nome_quesito,
                            jurados: []
                        };
                    }
                    notasAgrupadas[chave].jurados.push({
                        nome: nota.nome_jurado,
                        nota: nota.nota,
                        foto: mapaJurados[nota.nome_jurado] || '/imagens/padrao.jpg'
                    });
                });

                let html = '<div class="resultado-relatorio"><h2>📋 Notas Individuais de Cada Jurado</h2>';

                Object.values(notasAgrupadas).forEach(grupo => {
                    html += `
                        <div class="grupo-notas">
                            <h3>${grupo.escola} - ${grupo.quesito}</h3>
                            <div class="tabela-jurados-fotos">
                    `;

                    grupo.jurados.forEach(jurado => {
                        html += `
                            <div class="card-nota-jurado">
                                <img src="${jurado.foto}" alt="${jurado.nome}" class="card-nota-jurado-foto">
                                <div class="card-nota-jurado-info">
                                    <h4>${jurado.nome}</h4>
                                    <p><strong>Nota:</strong> ${jurado.nota}</p>
                                </div>
                            </div>
                        `;
                    });

                    html += `
                            </div>
                        </div>
                    `;
                });

                html += '</div>';
                document.getElementById('resultado').innerHTML = html;
            } catch (error) {
                console.error('Erro:', error);
                mostrarErro(error.message || 'Erro ao carregar dados');
            }
        }

        async function carregarNotaFinalQuesito() {
            try {
                const notas = await fetchJson('/api/relatorio/nota-final-quesito');

                if (!Array.isArray(notas) || notas.length === 0) {
                    mostrarErro('Nenhum dado disponível');
                    return;
                }

                let html = '<div class="resultado-relatorio"><h2>🎯 Nota Final por Quesito</h2><table>';
                html += '<thead><tr><th>Escola</th><th>Quesito</th><th>Menor Nota Descartada</th><th>Nota Final</th></tr></thead><tbody>';

                notas.forEach(nota => {
                    html += `
                        <tr>
                            <td>${nota.nome_escola}</td>
                            <td>${nota.nome_quesito}</td>
                            <td>${nota.menor_nota_descartada}</td>
                            <td><strong>${nota.nota_final}</strong></td>
                        </tr>
                    `;
                });

                html += '</tbody></table></div>';
                document.getElementById('resultado').innerHTML = html;
            } catch (error) {
                console.error('Erro:', error);
                mostrarErro(error.message || 'Erro ao carregar dados');
            }
        }

        async function carregarPontuacaoTotal() {
            try {
                const notas = await fetchJson('/api/relatorio/pontuacao-total');

                if (!Array.isArray(notas) || notas.length === 0) {
                    mostrarErro('Nenhum dado disponível');
                    return;
                }

                let html = '<div class="resultado-relatorio"><h2>🏆 Pontuação Total</h2><table>';
                html += '<thead><tr><th>Escola</th><th>Pontuação Total</th></tr></thead><tbody>';

                notas.forEach((nota, index) => {
                    html += `
                        <tr>
                            <td><strong>${index + 1}º - ${nota.nome_escola}</strong></td>
                            <td><strong>${nota.pontuacao_total}</strong></td>
                        </tr>
                    `;
                });

                html += '</tbody></table></div>';
                document.getElementById('resultado').innerHTML = html;
            } catch (error) {
                console.error('Erro:', error);
                mostrarErro(error.message || 'Erro ao carregar dados');
            }
        }

        async function carregarEscolaVencedora() {
            try {
                const vencedora = await fetchJson('/api/relatorio/escola-vencedora');

                if (!vencedora?.nome_escola) {
                    mostrarErro('Nenhum dado disponível');
                    return;
                }

                let html = `
                    <div class="resultado-relatorio">
                        <h2>👑 Escola Vencedora</h2>
                        <div class="card-vencedora">
                            <h3>🎊 ${vencedora.nome_escola}</h3>
                            <p><strong>Pontuação Total:</strong> ${vencedora.pontuacao_total}</p>
                        </div>
                    </div>
                `;
                document.getElementById('resultado').innerHTML = html;
            } catch (error) {
                console.error('Erro:', error);
                mostrarErro(error.message || 'Erro ao carregar dados');
            }
        }

        function limparRelatorio() {
            document.getElementById('resultado').innerHTML = '';
        }
    </script>
</body>

</html>
